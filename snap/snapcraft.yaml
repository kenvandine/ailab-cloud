name: ailab-cloud
adopt-info: ailab-cloud
base: core24
summary: Secure tunnel hub for remote access to AI Lab home devices
description: |
  AI Lab Cloud is the rendezvous server for the AI Lab ecosystem. It
  authenticates users via GitHub OAuth and proxies browser traffic to
  home AI Lab instances over persistent WebSocket tunnels — no VPN or
  port forwarding required.

  Fully self-contained: Redis, Caddy (TLS reverse proxy), and the hub
  API server are all bundled. Point DNS at the server, set four snap
  settings, and the service is live with a valid wildcard TLS certificate.

  Required configuration:

    snap set ailab-cloud domain=cloud.example.com
    snap set ailab-cloud github.client-id=<GitHub OAuth App client ID>
    snap set ailab-cloud github.client-secret=<GitHub OAuth App client secret>

  Wildcard TLS via DNS-01 challenge (required for *.domain subdomain routing):

    snap set ailab-cloud dns.provider=cloudflare
    snap set ailab-cloud dns.token=<API token>

  Supported dns.provider values:
    cloudflare, digitalocean, hetzner, duckdns, route53, namecheap, godaddy

  For route53, also set:
    snap set ailab-cloud dns.token-secret=<AWS secret access key>
    (dns.token holds the access key ID)

  For namecheap and godaddy, also set:
    snap set ailab-cloud dns.user=<API username>
    (dns.token holds the API key)

  The session secret is auto-generated on first configure.
  Restart caddy after changing domain or DNS settings:
    snap restart ailab-cloud.caddy

license: GPL-3.0+
grade: stable
confinement: strict

contact: https://github.com/lemonade-sdk/ailab-cloud/issues
issues: https://github.com/lemonade-sdk/ailab-cloud/issues
source-code: https://github.com/lemonade-sdk/ailab-cloud
website: https://github.com/lemonade-sdk/ailab-cloud

apps:
  redis:
    command: bin/redis-wrapper
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - network-bind

  hub:
    command: bin/ailab-cloud-wrapper
    daemon: simple
    restart-condition: on-failure
    after: [redis]
    plugs:
      - network
      - network-bind

  caddy:
    command: bin/caddy-wrapper
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - network-bind

parts:
  ailab-cloud:
    plugin: python
    source: .
    build-packages:
      - git
    python-packages:
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.29.0
      - httpx>=0.27.0
      - redis>=5.0.0
      - itsdangerous>=2.1.0
      - jinja2>=3.1.0
    override-pull: |
      craftctl default
      VERSION=$(craftctl get version)
      if [ -z "$VERSION" ]; then
        VERSION=$(git describe --tags --abbrev=10 2>/dev/null || echo "0.0.0")
        craftctl set version="$VERSION"
      fi

  redis:
    plugin: nil
    stage-packages:
      - redis-server

  caddy:
    plugin: nil
    build-packages:
      - golang-go
      - git
      - ca-certificates
    override-build: |
      export GOPATH="$SNAPCRAFT_PART_BUILD/go"
      export GOBIN="$GOPATH/bin"
      export PATH="$GOBIN:$PATH"
      go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      xcaddy build \
        --with github.com/caddy-dns/cloudflare \
        --with github.com/caddy-dns/digitalocean \
        --with github.com/caddy-dns/route53 \
        --with github.com/caddy-dns/hetzner \
        --with github.com/caddy-dns/duckdns \
        --with github.com/caddy-dns/namecheap \
        --with github.com/caddy-dns/godaddy \
        --output "$SNAPCRAFT_PART_INSTALL/bin/caddy"

  wrapper:
    plugin: dump
    source: snap/local
    organize:
      ailab-cloud-wrapper: bin/ailab-cloud-wrapper
      caddy-wrapper: bin/caddy-wrapper
      redis-wrapper: bin/redis-wrapper
